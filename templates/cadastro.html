<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastrar Produto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card p-4" style="width: 400px;">

    <h3>Cadastrar Produto</h3>

    <form action="/produtos/adicionar" method="POST">

        <input class="form-control mb-2" name="id" placeholder="ID">
        <input class="form-control mb-2" name="nome" placeholder="Nome">
        <input class="form-control mb-2" name="preco" placeholder="Preço">
        <input class="form-control mb-2" name="quantidade" placeholder="Quantidade">

        <button class="btn btn-success w-100" type="submit">
            Cadastrar
        </button>

    </form>

</div>

</body>
</html>
