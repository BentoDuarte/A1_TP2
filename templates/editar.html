<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar Produto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow rounded" style="width: 500px; padding: 20px;">
        <h3 class="mb-3">Editar Produto</h3>

        <form>
            <div class="mb-3">
                <label class="form-label">Nome</label>
                <input type="text" class="form-control" value="Produto Exemplo">
            </div>

            <div class="mb-3">
                <label class="form-label">Preço</label>
                <input type="number" class="form-control" value="100">
            </div>

            <div class="mb-3">
                <label class="form-label">Categoria</label>
                <input type="text" class="form-control" value="Categoria Exemplo">
            </div>

            <div class="d-flex justify-content-between">
                <a href="index.html" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>

                <button type="submit" class="btn btn-success">
                    <i class="bi bi-check"></i> Salvar
                </button>
            </div>
        </form>
    </div>

</body>
</html>
